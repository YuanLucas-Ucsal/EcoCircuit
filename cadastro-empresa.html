<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoCircuit - Cadastro Empresa</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-screen active">
    <div class="auth-left">
      <div class="auth-logo-wrap">
        <div class="auth-logo-icon">
          <svg viewBox="0 0 80 80" fill="none">
            <circle cx="40" cy="40" r="38" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
            <path d="M40 16 C28 16 20 26 20 36 C20 50 34 58 40 64 C46 58 60 50 60 36 C60 26 52 16 40 16Z" fill="#5ddb99"/>
            <path d="M32 38 L38 44 L50 32" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="28" cy="24" r="4" fill="#22d3ee" opacity=".8"/>
            <circle cx="52" cy="24" r="4" fill="#22d3ee" opacity=".8"/>
            <circle cx="28" cy="52" r="4" fill="#22d3ee" opacity=".8"/>
            <circle cx="52" cy="52" r="4" fill="#22d3ee" opacity=".8"/>
          </svg>
        </div>
        <div class="auth-logo-name">Eco<span>Circuit</span></div>
      </div>
    </div>
    
    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-title">Cadastre-se agora!</div>
        
        <div class="auth-tabs">
          <div class="auth-tab active">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2zM5 9h14v2H5V9zm0 4h6v2H5v-2zm8 0h6v2h-6v-2z"/></svg>
            Empresa
          </div>
          <a href="cadastro-cliente.html" class="auth-tab" style="text-decoration:none;">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            Cliente
          </a>
        </div>
        
        <form action="dashboard.html" method="GET">
          <div class="form-group">
            <label class="form-label">CNPJ*</label>
            <input type="text" class="form-input" placeholder="Digite seu CNPJ" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Email*</label>
            <input type="email" class="form-input" placeholder="Digite seu email" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">CEP*</label>
            <input type="text" class="form-input" placeholder="Digite seu CEP" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Endereço*</label>
            <input type="text" class="form-input" placeholder="Digite seu Endereço" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Senha*</label>
            <div class="input-wrap">
              <input type="password" class="form-input" id="pw-ce" placeholder="Digite sua senha" required>
              <button type="button" class="eye-btn" onclick="togglePw('pw-ce')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Confirme a Senha*</label>
            <div class="input-wrap">
              <input type="password" class="form-input" id="pw-ce2" placeholder="Digite sua senha" required>
              <button type="button" class="eye-btn" onclick="togglePw('pw-ce2')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          
          <button type="submit" class="btn-primary">Criar Conta</button>
        </form>
        
        <div class="auth-footer">
          Já é cadastrado? <a href="login-empresa.html">Faça seu Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
