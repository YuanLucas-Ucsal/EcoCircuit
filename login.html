<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCircuit - Login Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-screen active">
  <div class="auth-left">
    </div>
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-title">Faça seu Login</div>
      <div class="auth-tabs">
        <a href="login-empresa.html" class="auth-tab" style="text-decoration:none;">Empresa</a>
        <div class="auth-tab active">Cliente</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Email*</label>
        <input type="email" class="form-input" placeholder="Digite seu email">
      </div>
      <div class="form-group">
        <label class="form-label">Senha*</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="pw-lc" placeholder="Digite sua senha">
          <button class="eye-btn" onclick="togglePw('pw-lc')">👁️</button>
        </div>
      </div>
      
      <div class="forgot"><a href="#">Esqueci minha senha!</a></div>
      
      <a href="dashboard.html" style="text-decoration:none;">
          <button class="btn-primary">Entrar</button>
      </a>
      
      <div class="auth-footer">Não é cadastrado? <a href="cadastro-cliente.html">Criar conta</a></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
